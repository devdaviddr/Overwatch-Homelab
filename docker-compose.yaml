# Development docker-compose for Overwatch Homelab — builds local images for each app.
# Do NOT use these hardcoded credentials in production.
services:
  postgres:
    image: postgres:16-alpine
    container_name: overwatch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: overwatch
      POSTGRES_PASSWORD: overwatch_pass
      POSTGRES_DB: overwatch_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overwatch -d overwatch_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  hub-server:
    build:
      context: .
      dockerfile: ./apps/hub-server/Dockerfile
    image: overwatch/hub-server:local
    container_name: overwatch_hub_server
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://overwatch:overwatch_pass@postgres:5432/overwatch_db"
      PORT: "3001"
      CORS_ORIGIN: "http://localhost:5174"
      NODE_ENV: production
      # JWT_SECRET must be supplied via .env file or shell env — no default.
      # Generate a strong secret with: openssl rand -hex 32
      # The hub-server refuses to start (exit 1) if this is unset or shorter
      # than 16 chars — see src/lib/env.ts. We don't use ${JWT_SECRET:?…}
      # compose-level validation because that would also block `down`,
      # `logs`, `ps`, etc.
      JWT_SECRET: ${JWT_SECRET:-}
    ports:
      - "3002:3001"
    depends_on:
      - postgres

  hub-client:
    build:
      context: .
      dockerfile: ./apps/hub-client/Dockerfile
    image: overwatch/hub-client:local
    container_name: overwatch_hub_client
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - hub-server

  # lab-agent is gated behind the "agent" compose profile. Default
  # `docker compose up` starts only postgres + hub-server + hub-client.
  # To run the Linux-in-Docker agent (Linux hosts only — macOS should
  # run the agent natively for real host metrics), first create a
  # HomeLab in the dashboard to get its UUID, set LAB_ID in .env, then:
  #     docker compose --profile agent up -d
  lab-agent:
    profiles: ["agent"]
    build:
      context: .
      dockerfile: ./apps/lab-agent/Dockerfile
    image: overwatch/lab-agent:local
    container_name: overwatch_lab_agent
    restart: unless-stopped
    environment:
      HUB_URL: "http://hub-server:3001"
      # Empty default so non-agent `docker compose up` doesn't fail
      # interpolation for a service it isn't even starting. The agent's
      # own startup check (apps/lab-agent/src/index.ts) exits 1 with a
      # clear message if LAB_ID is blank.
      LAB_ID: ${LAB_ID:-}
    depends_on:
      - hub-server

volumes:
  postgres_data:
    driver: local
