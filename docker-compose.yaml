# Development docker-compose for Overwatch Homelab — builds local images for each app.
# Do NOT use these hardcoded credentials in production.
services:
  postgres:
    image: postgres:16-alpine
    container_name: overwatch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: overwatch
      POSTGRES_PASSWORD: overwatch_pass
      POSTGRES_DB: overwatch_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overwatch -d overwatch_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  hub-server:
    build:
      context: .
      dockerfile: ./apps/hub-server/Dockerfile
    image: overwatch/hub-server:local
    container_name: overwatch_hub_server
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://overwatch:overwatch_pass@postgres:5432/overwatch_db"
      PORT: "3001"
      CORS_ORIGIN: "http://localhost:5174"
      NODE_ENV: production
      JWT_SECRET: "dev_jwt_secret"
    ports:
      - "3002:3001"
    depends_on:
      - postgres

  hub-client:
    build:
      context: .
      dockerfile: ./apps/hub-client/Dockerfile
    image: overwatch/hub-client:local
    container_name: overwatch_hub_client
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - hub-server

  lab-agent:
    build:
      context: .
      dockerfile: ./apps/lab-agent/Dockerfile
    image: overwatch/lab-agent:local
    container_name: overwatch_lab_agent
    restart: unless-stopped
    environment:
      HUB_URL: "http://hub-server:3001"
      LAB_ID: "add71a52-ecd3-4962-8052-65b2b655516e"
    depends_on:
      - hub-server

volumes:
  postgres_data:
    driver: local
